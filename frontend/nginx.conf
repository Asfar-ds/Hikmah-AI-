server {
    listen 80;
    server_name _;

    # Set the correct root directory for the built files from your Dockerfile
    root /usr/share/nginx/html;
    index index.html;

    # 🛑 FIX 1: Single, corrected try_files for SPA routing.
    # This resolves the 'duplicate try_files' error and the infinite redirect cycle (500 error).
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # 🛑 FIX 2: Reverse proxy for backend API
    location /api/ {
        # CRITICAL FIX: Use the Docker Compose service name 'backend' instead of localhost (127.0.0.1).
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://backend:8000;
        
        # This removes the /api/ prefix before sending the request to your Python backend
        rewrite ^/api/(.*)$ /$1 break;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: static file cache for performance
    root /usr/share/nginx/html;
    index index.html;

    # ✅ Fix React Router reload issue (this line is key)
    location / {
        root /var/www/html;
        index index.html index.htm;
        try_files $uri /index.html;
    }

    # ✅ Reverse proxy for backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000//;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: static file cache (better performance)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|ttf|svg)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files and fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: cache static assets aggressively
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?|ttf)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Small security headers (optional)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    }

    # Optional fallback (safety net)
    error_page 404 /index.html;
}
